name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install sentencepiece tokenizers matplotlib pytest

      - name: Check package imports
        run: |
          python -c "from memory_bench.mechanisms.base import MemoryModule; print('base OK')"
          python -c "from memory_bench.mechanisms.persistent import PersistentMemory; print('persistent OK')"
          python -c "from memory_bench.bench import aggregate_results; print('bench OK')"
          python -c "from memory_bench.plot import plot_bpb_comparison; print('plot OK')"
          python -c "from memory_bench.models import build_gpt_config; print('models OK')"

      - name: Run CPU-compatible tests
        run: |
          pytest tests/test_cli_args.py tests/test_niah_generation.py -v --tb=short || true
